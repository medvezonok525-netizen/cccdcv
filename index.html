<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LampoViews — Аналитика YouTube каналов</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #0a0a1a;
      --card-bg: rgba(18, 18, 35, 0.85);
      --card-bg-solid: #121223;
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text-secondary: #a0a0c8;
      --text-muted: #6060a0;
      --accent: #ff2d55;
      --accent-glow: rgba(255, 45, 85, 0.25);
      --accent-dark: #e61e45;
      --green: #30d158;
      --blue: #0a84ff;
      --purple: #bf5af2;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      transition: all 0.2s ease;
    }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
    }
    
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 50%, rgba(255, 45, 85, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(10, 132, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(191, 90, 242, 0.05) 0%, transparent 50%);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ff2d55 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    
    .logo span {
      background: linear-gradient(135deg, #ff2d55 0%, #ff6b8a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .api-badge {
      padding: 6px 14px;
      background: rgba(48, 209, 88, 0.12);
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      border: 1px solid rgba(48, 209, 88, 0.2);
    }
    
    .api-badge span {
      font-size: 14px;
      font-weight: 700;
    }
    
    .settings-btn {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
    }
    
    .settings-btn:hover {
      background: rgba(255, 45, 85, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      transform: rotate(45deg);
    }
    
    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }
    
    .search-section {
      margin-bottom: 32px;
    }
    
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .channel-input {
      flex: 1;
      padding: 16px 20px;
      background: var(--card-bg-solid);
      border: 2px solid var(--border);
      border-radius: 28px;
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }
    
    .channel-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    
    .channel-input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }
    
    .search-btn {
      padding: 0 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border: none;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    
    .search-btn:active {
      transform: translateY(0);
    }
    
    .history-section {
      margin-top: 16px;
    }
    
    .history-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .history-item {
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    
    .history-item:hover {
      background: rgba(255, 45, 85, 0.15);
      color: var(--accent);
      border-color: var(--accent);
    }
    
    .result-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 40px 32px;
      text-align: center;
      transition: all 0.3s;
      animation: fadeInUp 0.4s ease;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .channel-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255, 45, 85, 0.3);
    }
    
    .channel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .channel-avatar .avatar-fallback {
      font-size: 48px;
      opacity: 0.8;
    }
    
    .channel-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .channel-handle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .subscriber-number {
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      margin: 12px 0;
      transition: all 0.1s ease;
    }
    
    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin: 24px 0;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(255, 45, 85, 0.12);
      border-radius: 40px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }
    
    .error-message {
      background: rgba(255, 45, 85, 0.1);
      border: 1px solid rgba(255, 45, 85, 0.25);
      border-radius: 20px;
      padding: 16px 20px;
      color: var(--accent);
      font-weight: 500;
      text-align: center;
      margin-bottom: 20px;
      animation: shake 0.3s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 40px;
    }
    
    .loader-dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }
    
    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(--blue); }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; background: var(--purple); }
    
    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.5; }
      to { transform: translateY(-15px); opacity: 1; }
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
    }
    
    .modal-overlay.active {
      display: block;
    }
    
    .settings-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg-solid);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      z-index: 201;
      animation: modalIn 0.2s ease;
    }
    
    .settings-modal.active {
      display: block;
    }
    
    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
    
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    
    .settings-header h3 {
      font-size: 22px;
      font-weight: 700;
    }
    
    .close-modal {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-secondary);
    }
    
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .setting-row:last-child {
      border-bottom: none;
    }
    
    .setting-row label {
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .theme-buttons {
      display: flex;
      gap: 8px;
    }
    
    .theme-btn {
      padding: 8px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 40px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    
    .theme-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .lang-select-wrapper {
      position: relative;
    }
    
    .lang-select-btn {
      padding: 8px 32px 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 40px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lang-select-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .lang-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: var(--card-bg-solid);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      overflow: hidden;
      z-index: 300;
      min-width: 160px;
    }
    
    .lang-dropdown.open {
      display: block;
    }
    
    .lang-option {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      color: var(--text-secondary);
    }
    
    .lang-option:hover {
      background: rgba(255, 45, 85, 0.1);
      color: var(--accent);
    }
    
    .lang-option.selected {
      background: var(--accent);
      color: white;
    }
    
    @media (max-width: 550px) {
      .header {
        padding: 16px 20px;
      }
      
      .container {
        padding: 24px 16px 40px;
      }
      
      .search-box {
        flex-direction: column;
      }
      
      .search-btn {
        padding: 14px;
      }
      
      .result-card {
        padding: 28px 20px;
        border-radius: 32px;
      }
      
      .subscriber-number {
        font-size: 44px;
      }
      
      .stats-grid {
        gap: 24px;
      }
      
      .stat-value {
        font-size: 18px;
      }
      
      .setting-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>

    function t(key) {
      const keys = key.split('.');
      let value = translations[currentLang];
      for (const k of keys) {
        if (value && value[k] !== undefined) value = value[k];
        else return key;
      }
      return value;
    }
    
    function updateUILanguage() {
      document.getElementById('settingsTitle').textContent = t('settings');
      document.getElementById('themeLabel').textContent = t('theme');
      document.getElementById('darkBtn').textContent = t('dark');
      document.getElementById('lightBtn').textContent = t('light');
      document.getElementById('langLabel').textContent = t('language');
      channelInput.placeholder = t('searchPlaceholder');
      searchBtn.textContent = t('searchBtn');
      document.getElementById('historyTitle').textContent = t('historyTitle');
      document.getElementById('viewsLabel').textContent = t('viewsLabel');
      document.getElementById('videosLabel').textContent = t('videosLabel');
      document.getElementById('liveLabel').textContent = t('liveLabel');
      
      const langNames = { ru: '🇷🇺 Русский', en: '🇬🇧 English', uk: '🇺🇦 Українська', zh: '🇨🇳 中文' };
      document.getElementById('currentLangText').textContent = langNames[currentLang];
    }
    
    function toggleLangDropdown() {
      document.getElementById('langDropdown').classList.toggle('open');
    }
    
    function selectLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lampo_lang', currentLang);
      updateUILanguage();
      document.getElementById('langDropdown').classList.remove('open');
      
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.getAttribute('data-lang') === lang) opt.classList.add('selected');
      });
      
      if (currentData) {
        viewCountEl.textContent = formatFullNumber(currentData.views);
        videoCountEl.textContent = formatFullNumber(currentData.videos);
        if (currentData.subscribers) animateNumber(currentData.subscribers, subscriberCountEl, true);
      }
    }
    
    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }
    
    function formatFullNumber(num) {
      return new Intl.NumberFormat(currentLang === 'ru' ? 'ru-RU' : currentLang === 'uk' ? 'uk-UA' : currentLang === 'zh' ? 'zh-CN' : 'en-US').format(num);
    }
    
    function updateQuotaDisplay() {
      quotaUsedEl.textContent = formatFullNumber(totalQueries);
      localStorage.setItem('lampo_queries', totalQueries);
      localStorage.setItem('lampo_queries_date', new Date().toDateString());
    }
    
    function showError(text) {
      errorMessage.textContent = '⚠️ ' + text;
      errorMessage.classList.remove('hidden');
      resultCard.classList.add('hidden');
      setTimeout(() => {
        if (!errorMessage.classList.contains('hidden')) errorMessage.classList.add('hidden');
      }, 4000);
    }
    
    function showLoader(show) {
      if (show) {
        loader.classList.remove('hidden');
        resultCard.classList.add('hidden');
        errorMessage.classList.add('hidden');
      } else {
        loader.classList.add('hidden');
      }
    }
    
    function setAvatar(url, channelTitle) {
      channelAvatar.innerHTML = '';
      const img = document.createElement('img');
      img.src = url;
      img.alt = channelTitle;
      img.onerror = () => {
        channelAvatar.innerHTML = '<div class="avatar-fallback">📺</div>';
      };
      channelAvatar.appendChild(img);
    }
    
    function animateNumber(target, element, formatFull = false) {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      const start = animatedValue;
      const end = target;
      const duration = 800;
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(1, elapsed / duration);
        const easeOutCubic = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(start + (end - start) * easeOutCubic);
        animatedValue = current;
        
        if (formatFull) element.textContent = formatFullNumber(current);
        else element.textContent = formatNumber(current);
        
        if (progress < 1) animationFrame = requestAnimationFrame(update);
        else {
          animatedValue = end;
          if (formatFull) element.textContent = formatFullNumber(end);
          else element.textContent = formatNumber(end);
          animationFrame = null;
        }
      }
      animationFrame = requestAnimationFrame(update);
    }
    
    async function fetchChannelData(handle) {
      totalQueries++;
      updateQuotaDisplay();
      
      const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&forHandle=${handle}&key=${API_KEY}`;
      const response = await fetch(url);
      const data = await response.json();
      
      if (data.error) throw new Error(t('errors.apiError'));
      if (!data.items || data.items.length === 0) throw new Error(t('errors.notFound'));
      
      const channel = data.items[0];
      return {
        id: channel.id,
        title: channel.snippet.title,
        customUrl: channel.snippet.customUrl || handle,
        subscribers: parseInt(channel.statistics.subscriberCount),
        views: parseInt(channel.statistics.viewCount),
        videos: parseInt(channel.statistics.videoCount),
        avatarUrl: channel.snippet.thumbnails.high?.url || channel.snippet.thumbnails.medium?.url || channel.snippet.thumbnails.default?.url
      };
    }
    
    async function refreshData() {
      if (!currentChannel) return;
      try {
        const newData = await fetchChannelData(currentChannel);
        if (newData.subscribers !== currentData?.subscribers) {
          animateNumber(newData.subscribers, subscriberCountEl, true);
        }
        if (newData.views !== currentData?.views) {
          viewCountEl.textContent = formatFullNumber(newData.views);
        }
        if (newData.videos !== currentData?.videos) {
          videoCountEl.textContent = formatFullNumber(newData.videos);
        }
        if (newData.avatarUrl !== currentData?.avatarUrl) {
          setAvatar(newData.avatarUrl, newData.title);
        }
        currentData = newData;
      } catch (err) {
        console.error('Refresh error:', err);
      }
    }
    
    async function searchChannel() {
      let input = channelInput.value.trim();
      if (!input) {
        showError(t('errors.empty'));
        return;
      }
      
      input = input.replace(/^@/, '').trim();
      if (input.length < 2) {
        showError(t('errors.short'));
        return;
      }
      
      showLoader(true);
      
      try {
        const data = await fetchChannelData(input);
        
        if (updateInterval) clearInterval(updateInterval);
        
        currentChannel = input;
        currentData = data;
        
        addToHistory(input);
        
        channelNameEl.textContent = data.title;
        channelHandleEl.textContent = '@' + (data.customUrl || input);
        setAvatar(data.avatarUrl, data.title);
        animatedValue = 0;
        animateNumber(data.subscribers, subscriberCountEl, true);
        viewCountEl.textContent = formatFullNumber(data.views);
        videoCountEl.textContent = formatFullNumber(data.videos);
        
        resultCard.classList.remove('hidden');
        errorMessage.classList.add('hidden');
        
        updateInterval = setInterval(refreshData, 15000);
        
      } catch (err) {
        showError(err.message || t('errors.notFound'));
        resultCard.classList.add('hidden');
      } finally {
        showLoader(false);
      }
    }
    
    function addToHistory(channel) {
      searchHistory = searchHistory.filter(h => h !== channel);
      searchHistory.unshift(channel);
      searchHistory = searchHistory.slice(0, 5);
      localStorage.setItem('lampo_history', JSON.stringify(searchHistory));
      renderHistory();
    }
    
    function renderHistory() {
      if (searchHistory.length === 0) {
        historySection.classList.add('hidden');
        return;
      }
      historySection.classList.remove('hidden');
      historyList.innerHTML = searchHistory.map(ch => 
        `<div class="history-item" onclick="searchHistoryItem('${ch.replace(/'/g, "\\'")}')">@${ch}</div>`
      ).join('');
    }
    
    function searchHistoryItem(channel) {
      channelInput.value = channel;
      searchChannel();
    }
    
    function loadSavedData() {
      const savedQueries = localStorage.getItem('lampo_queries');
      const savedDate = localStorage.getItem('lampo_queries_date');
      const today = new Date().toDateString();
      
      if (savedQueries && savedDate === today) totalQueries = parseInt(savedQueries) || 0;
      else totalQueries = 0;
      updateQuotaDisplay();
      
      const savedHistory = localStorage.getItem('lampo_history');
      if (savedHistory) {
        try { searchHistory = JSON.parse(savedHistory); renderHistory(); } catch(e) {}
      }
      
      const savedLang = localStorage.getItem('lampo_lang');
      if (savedLang && translations[savedLang]) currentLang = savedLang;
      updateUILanguage();
      
      const savedTheme = localStorage.getItem('lampo_theme');
      if (savedTheme === 'light') setTheme('light');
      else setTheme('dark');
      
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.getAttribute('data-lang') === currentLang) opt.classList.add('selected');
      });
    }
    
    function setTheme(theme) {
      if (theme === 'light') {
        document.documentElement.style.setProperty('--bg', '#f5f5ff');
        document.documentElement.style.setProperty('--card-bg', 'rgba(255, 255, 255, 0.9)');
        document.documentElement.style.setProperty('--card-bg-solid', '#ffffff');
        document.documentElement.style.setProperty('--border', 'rgba(0, 0, 0, 0.08)');
        document.documentElement.style.setProperty('--border-light', 'rgba(0, 0, 0, 0.12)');
        document.documentElement.style.setProperty('--text', '#1a1a2e');
        document.documentElement.style.setProperty('--text-secondary', '#5a5a8a');
        document.documentElement.style.setProperty('--text-muted', '#8a8ab0');
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.getAttribute('data-theme') === 'light') btn.classList.add('active');
        });
      } else {
        document.documentElement.style.setProperty('--bg', '#0a0a1a');
        document.documentElement.style.setProperty('--card-bg', 'rgba(18, 18, 35, 0.85)');
        document.documentElement.style.setProperty('--card-bg-solid', '#121223');
        document.documentElement.style.setProperty('--border', 'rgba(255, 255, 255, 0.08)');
        document.documentElement.style.setProperty('--border-light', 'rgba(255, 255, 255, 0.12)');
        document.documentElement.style.setProperty('--text', '#ffffff');
        document.documentElement.style.setProperty('--text-secondary', '#a0a0c8');
        document.documentElement.style.setProperty('--text-muted', '#6060a0');
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.getAttribute('data-theme') === 'dark') btn.classList.add('active');
        });
      }
      localStorage.setItem('lampo_theme', theme);
    }
    
    function openSettings() {
      document.getElementById('settingsModal').classList.add('active');
      document.getElementById('modalOverlay').classList.add('active');
    }
    
    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('active');
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('langDropdown').classList.remove('open');
    }
    
    function init() {
      loadSavedData();
      searchBtn.addEventListener('click', searchChannel);
      channelInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchChannel(); });
      document.getElementById('modalOverlay').addEventListener('click', closeSettings);
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.lang-select-wrapper')) document.getElementById('langDropdown').classList.remove('open');
      });
      window.addEventListener('beforeunload', () => { if (updateInterval) clearInterval(updateInterval); });
    }
    
    init();
  </script>
</body>
</html>
